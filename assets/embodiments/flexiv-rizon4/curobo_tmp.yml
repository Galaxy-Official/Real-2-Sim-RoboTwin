robot_cfg:
  kinematics:
    urdf_path: ${ASSETS_PATH}/assets/embodiments/flexiv-rizon4/rizon4_curobo.urdf
    asset_root_path: ${ASSETS_PATH}/assets/embodiments/flexiv-rizon4
    base_link: "base_link"
    ee_link: "closed_fingers_tcp"
    collision_link_names:
      [
        "base_link",
        "link1",
        "link2",
        "link3",
        "link4",
        "link5",
        "link6",
        "link7",
        "flange",
        "closed_fingers_tcp",
      ]
    collision_spheres: ${ASSETS_PATH}/assets/embodiments/flexiv-rizon4/collision_rizon4.yml
    collision_sphere_buffer: 0.004
    extra_collision_spheres: {}
    self_collision_ignore:
      {
        "base_link": ["link1", "link2"],
        "link1": ["link2", "link3"],
        "link2": ["link3", "link4"],
        "link3": ["link4", "link5"],
        "link4": ["link5", "link6"],
        "link5": ["link6", "link7", "flange", "closed_fingers_tcp"],
        "link6": ["link7", "flange", "closed_fingers_tcp"],
        "link7": ["flange", "closed_fingers_tcp"],
        "flange": ["closed_fingers_tcp"],
      }
    self_collision_buffer:
      {
        "base_link": 0.04,
        "link1": 0.02,
        "link2": 0.01,
        "link3": 0.01,
        "link4": 0.01,
        "link5": 0.01,
        "link6": 0.01,
        "link7": 0.005,
        "flange": 0.0,
        "closed_fingers_tcp": 0.0,
      }
    use_global_cumul: True
    mesh_link_names:
      [
        "base_link",
        "link1",
        "link2",
        "link3",
        "link4",
        "link5",
        "link6",
        "link7",
      ]
    cspace:
      joint_names:
        ["joint1", "joint2", "joint3", "joint4", "joint5", "joint6", "joint7"]
      retract_config: [0.0, -0.69813, 0.0, 1.570796, 0.0, 0.69813, 0.0]
      null_space_weight: [1, 1, 1, 1, 1, 1, 1]
      cspace_distance_weight: [1, 1, 1, 1, 1, 1, 1]
      max_acceleration: 15.0
      max_jerk: 500.0
planner:
  frame_bias: [0.0, 0.0, 0.0]
