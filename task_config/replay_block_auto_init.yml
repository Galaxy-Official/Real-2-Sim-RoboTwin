render_freq: 0
episode_num: 100
use_seed: false
save_freq: 15

# Replace these embodiment names with the ones used on your RoboTwin server.
embodiment:
  - replace_left_embodiment
  - replace_right_embodiment
  - 0.8

language_num: 100
domain_randomization:
  random_background: false
  cluttered_table: false
  clean_background_rate: 1
  random_head_camera_dis: 0
  random_table_height: 0
  random_light: false
  crazy_random_light_rate: 0

camera:
  head_camera_type: D435
  wrist_camera_type: D435
  collect_head_camera: true
  collect_wrist_camera: true

data_type:
  rgb: true
  third_view: false
  depth: false
  pointcloud: false
  observer: false
  endpose: true
  qpos: true
  mesh_segmentation: false
  actor_segmentation: false

pcd_down_sample_num: 1024
pcd_crop: true
save_path: ./data
clear_cache_freq: 5
collect_data: true
eval_video_log: true

init_meta_from_env: true
init_meta_env_var: REPLAY_INIT_META_PATH
target_object_modelname: replace_with_robotwin_modelname
target_object_model_id: 0
target_object_convex: true
target_object_spawn_pose: [0.0, 0.20, 0.82, 1.0, 0.0, 0.0, 0.0]

# Optional extra static assets to instantiate before auto-init applies the first-frame pose.
static_scene_objects: []
