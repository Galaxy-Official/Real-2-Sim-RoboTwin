policy_name: Replay_Policy

task_name: replay_block_auto_init
task_config: replay_block_auto_init

data_dir: /path/to/lerobot_dataset
episode_index: 0
replay_arm: right

state_column: observation.state
chunk_size: 1
hold_gripper: null
max_consecutive_fails: 5

object_config_path: policy/Replay_Policy/object_configs/block_stack_default.yml
init_meta_env_var: REPLAY_INIT_META_PATH

auto_init:
  enabled: true
  init_meta_dir: policy/Replay_Policy/init_meta
  first_frame_cache_dir: policy/Replay_Policy/init_meta/cache
  wrist_video_key: observation.images.wrist
  state_column: observation.state
  intrinsics:
    # Manual fallback. When camera_calibration.path is set, the fisheye
    # calibration below is used and these values are ignored.
    fx: 290.58525666
    fy: 387.44700888
    cx: 320.0
    cy: 240.0
  camera_calibration:
    type: fisheye
    path: policy/Replay_Policy/auto_init/fisheye_calib_result_resized.npz
    # Set this if the npz was calibrated at a resolution different from the
    # first-frame image. Format: [width, height]. Keep null only if they match.
    calibration_image_size: null
  undistort:
    enabled: true
    balance: 0.0
    fov_scale: 1.0
    mask: true
    frame_output_template: "{cache_dir}/episode_{episode_index:06d}_wrist_undistorted.png"
    mask_output_template: "{cache_dir}/episode_{episode_index:06d}_mask_undistorted.png"
  aloha_wrist_to_eef_pose:
    camera_convention: opencv
    matrix:
      - [0.000001, -0.000796, -1.000000, 0.000000]
      - [0.905971, 0.423340, -0.000337, 0.136103]
      - [0.423341, -0.905970, 0.000722, 0.074117]
      - [0.000000, 0.000000, 0.000000, 1.000000]
    inverse_matrix:
      - [0.000001, 0.905971, 0.423341, -0.154682]
      - [-0.000796, 0.423340, -0.905970, 0.009530]
      - [-1.000000, -0.000337, 0.000722, -0.000008]
      - [0.000000, 0.000000, 0.000000, 1.000000]
    translation: [0.000000, 0.136103, 0.074117]
    rotvec: [-0.8808659531652236, -1.384415791655276, 0.8819689407892274]
  mask:
    mode: file_template
    template: "{data_dir}/masks/episode_{episode_index:06d}.png"
  depth_anything:
    mode: command
    output_template: "{cache_dir}/episode_{episode_index:06d}_depth.npy"
    # This argv list is passed directly to subprocess.run(...).
    # Supported placeholders: {image_path} {output_path} {intrinsics_path} {cache_dir} {episode_index}
    # Example:
    # command:
    #   - conda
    #   - run
    #   - -n
    #   - depth-anything-3
    #   - python
    #   - policy/Replay_Policy/auto_init/run_depth_anything_metric.py
    #   - --repo-root
    #   - third_party/Depth-Anything-3
    #   - --image
    #   - "{image_path}"
    #   - --output
    #   - "{output_path}"
    #   - --intrinsics
    #   - "{intrinsics_path}"
    #   - --model-dir
    #   - depth-anything/da3metric-large
    #   - --metric-scale
    #   - da3metric
    command:
      - conda
      - run
      - -n
      - depth-anything-3
      - python
      - policy/Replay_Policy/auto_init/run_depth_anything_metric.py
      - --repo-root
      - third_party/Depth-Anything-3
      - --image
      - "{image_path}"
      - --output
      - "{output_path}"
      - --intrinsics
      - "{intrinsics_path}"
      - --model-dir
      - depth-anything/da3metric-large
      - --metric-scale
      - da3metric
  foundationpose:
    mode: command
    output_template: "{cache_dir}/episode_{episode_index:06d}_foundationpose.json"
    # This argv list is passed directly to subprocess.run(...).
    # Supported placeholders:
    # {image_path} {rgb_path} {depth_path} {mask_path}
    # {intrinsics_path} {mesh_path} {output_path} {cache_dir} {episode_index}
    # Example:
    # command:
    #   - conda
    #   - run
    #   - -n
    #   - foundationpose
    #   - python
    #   - policy/Replay_Policy/auto_init/run_foundationpose_once.py
    #   - --repo-root
    #   - third_party/FoundationPose
    #   - --rgb
    #   - "{image_path}"
    #   - --depth
    #   - "{depth_path}"
    #   - --mask
    #   - "{mask_path}"
    #   - --intrinsics
    #   - "{intrinsics_path}"
    #   - --mesh
    #   - "{mesh_path}"
    #   - --output
    #   - "{output_path}"
    #   - --debug-dir
    #   - "{cache_dir}/foundationpose_debug_{episode_index:06d}"
    command:
      - conda
      - run
      - -n
      - foundationpose
      - python
      - policy/Replay_Policy/auto_init/run_foundationpose_once.py
      - --repo-root
      - third_party/FoundationPose
      - --rgb
      - "{image_path}"
      - --depth
      - "{depth_path}"
      - --mask
      - "{mask_path}"
      - --intrinsics
      - "{intrinsics_path}"
      - --mesh
      - "{mesh_path}"
      - --output
      - "{output_path}"
      - --debug-dir
      - "{cache_dir}/foundationpose_debug_{episode_index:06d}"

seed: 0
ckpt_setting: replay
